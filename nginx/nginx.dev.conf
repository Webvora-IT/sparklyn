upstream nextjs_dev {
    server app:3000;
}

server {
    listen 80;
    server_name localhost;

    # Logging
    access_log /var/log/nginx/sparklyn_access.log;
    error_log  /var/log/nginx/sparklyn_error.log;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Max upload size (for image uploads)
    client_max_body_size 20M;

    # Next.js HMR WebSocket support
    location /_next/webpack-hmr {
        proxy_pass http://nextjs_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets
    location /_next/static/ {
        proxy_pass http://nextjs_dev;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # All other requests → Next.js dev server
    location / {
        proxy_pass http://nextjs_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "keep-alive";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
