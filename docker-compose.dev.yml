version: '3.8'

# Development environment — hot reload + nginx dev proxy
# Usage: docker compose -f docker-compose.dev.yml up

services:
  # ── PostgreSQL ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sparklyn_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: sparklyn_db
      POSTGRES_USER: sparklyn
      POSTGRES_PASSWORD: sparklyn_password
    ports:
      - "5433:5432"   # Exposed for local Prisma Studio / DB tools
    volumes:
      - sparklyn_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparklyn -d sparklyn_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sparklyn_dev_net

  # ── Next.js App (dev server with HMR) ────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: sparklyn_app_dev
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sparklyn:sparklyn_password@postgres:5432/sparklyn_db
      NODE_ENV: development
      WATCHPACK_POLLING: "true"   # Required for HMR inside Docker on Windows
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sparklyn_dev_net

  # ── Nginx (dev proxy — preserves HMR websocket) ──
  nginx:
    image: nginx:1.25-alpine
    container_name: sparklyn_nginx_dev
    restart: unless-stopped
    ports:
      - "3001:80"   # Access at http://localhost:3001
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - sparklyn_dev_net

volumes:
  sparklyn_postgres_dev_data:

networks:
  sparklyn_dev_net:
    driver: bridge
